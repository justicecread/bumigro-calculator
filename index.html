  { sku:"GRO-MF-60.4K.07-BLK-12M", width:60, length:4000, thick:"0.7", dur:"12", color:"Black", p:[522.00,469.80,417.60,365.40], ft:[0.131,0.117,0.104,0.091], lb:[4.09,3.68,3.27,2.86], kg:[9.02,8.12,7.21,6.31] },

  { sku:"GRO-MF-60.4K.10-BLK-8M",  width:60, length:4000, thick:"1.0", dur:"8",  color:"Black", p:[739.00,665.10,591.20,517.30], ft:[0.185,0.166,0.148,0.129], lb:[4.09,3.68,3.27,2.86], kg:[9.02,8.12,7.22,6.31] },
  { sku:"GRO-MF-60.4K.10-BLK-12M", width:60, length:4000, thick:"1.0", dur:"12", color:"Black", p:[739.00,665.10,591.20,517.30], ft:[0.185,0.166,0.148,0.129], lb:[4.09,3.68,3.27,2.86], kg:[9.02,8.12,7.22,6.31] },

const card     = { background:BD, borderRadius:10, border:`1px solid ${BDD}`, padding:"20px" };

function BumigroCalculator({ adminMode = true }) {
  const [isMobile, setIsMobile] = useState(typeof window !== "undefined" && window.innerWidth < 768);
  const [products, setProducts] = useState(DEFAULT_PRODUCTS);
  const [tab, setTab]           = useState("calc");
  const [editMode, setEditMode]     = useState(false);

  const [sheetUrl, setSheetUrl]     = useState("");
  const [csvPaste, setCsvPaste]     = useState("");
  const [syncMode, setSyncMode]     = useState("url");
  const [syncStatus, setSyncStatus] = useState(null);
  const [syncMsg, setSyncMsg]       = useState("");
  const [selWidth, setSelWidth] = useState("");
  const [selLength, setSelLength] = useState("");
  const [selThick, setSelThick]   = useState("");
  const [selDur, setSelDur]       = useState("");
  const [selColor, setSelColor]   = useState("");
  const [qty, setQty]             = useState(1);

  const [convLaborHrs, setConvLaborHrs]     = useState("");
  const [convLaborRate, setConvLaborRate]   = useState("");

  const [compCalculated, setCompCalculated] = useState(false);
  const [showModal, setShowModal]           = useState(false);
  const [modalName, setModalName]           = useState("");
  const [modalEmail, setModalEmail]         = useState("");
  const [modalPhone, setModalPhone]         = useState("");

  useEffect(() => {
    const l = document.createElement("link");

    const s = document.createElement("style");
    s.textContent = `
      .bumi-input::placeholder { color: #F5EDE0; opacity: 1; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }

      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes popIn {
        0%   { opacity: 0; transform: scale(0.94); }
        60%  { transform: scale(1.02); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(16px); }
        to   { opacity: 1; transform: translateX(0); }
      }

        0%   { transform: scale(1); }
        40%  { transform: scale(1.06); }
        100% { transform: scale(1); }

      .anim-pop       { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
      .anim-fade      { animation: fadeIn 0.3s ease both; }
      .anim-slide-right { animation: slideInRight 0.3s ease both; }
      .anim-pulse     { animation: countPulse 0.3s ease both; }
    `;
    document.head.appendChild(s);
    const handleResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handleResize);
    return () => window.removeEventListener("resize", handleResize);
  }, []);

  // If tab is "prices" but adminMode is off, fall back to calc
  useEffect(() => {
    if (!adminMode && tab === "prices") setTab("calc");
  }, [adminMode]);

  const widths  = useMemo(() => [...new Set(products.map(p => p.width))].sort((a,b) => a-b), [products]);
  const lengths = useMemo(() => {
    const f = products.filter(p => !selWidth || p.width === Number(selWidth));
    return [...new Set(f.map(p => p.length))].sort((a,b) => a-b);
  }, [products, selWidth]);
  const thicks = useMemo(() => {
    const f = products.filter(p => (!selWidth||p.width===Number(selWidth)) && (!selLength||p.length===Number(selLength)));
    return [...new Set(f.map(p => p.thick))].sort((a,b) => Number(a)-Number(b));
  }, [products, selWidth, selLength]);
  const durs = ["4", "8", "12"];
  const colors = useMemo(() => {
    const f = products.filter(p => (!selWidth||p.width===Number(selWidth)) && (!selLength||p.length===Number(selLength)) && (!selThick||p.thick===selThick) && (!selDur||p.dur===selDur));
    return [...new Set(f.map(p => p.color))];
  }, [products, selWidth, selLength, selThick, selDur]);

  const handleSelect = (level, value) => {
    const w = level===0 ? value : selWidth;
    const byW = p => !w || p.width === Number(w);

    const l = "4000";

    let t = level===2 ? value : selThick;
    const vT = [...new Set(products.filter(p => byW(p) && p.length===4000).map(p => p.thick))].sort((a,b) => Number(a)-Number(b));
    if (!vT.includes(t)) t = level===2 ? value : "";

    let d = level===3 ? value : selDur;
    const vD = [...new Set(products.filter(p => byW(p) && p.length===4000 && (!t||p.thick===t)).map(p => p.dur))].sort((a,b) => Number(a)-Number(b));
    if (!vD.includes(d)) d = level===3 ? value : "";

    setSelWidth(w); setSelLength(l); setSelThick(t); setSelDur(d); setSelColor("");
  };

  const product   = useMemo(() => products.find(p => p.width===Number(selWidth) && (!selLength||p.length===Number(selLength)) && (!selThick||p.thick===selThick) && (!selDur||p.dur===selDur) && (!selColor||p.color===selColor)), [products, selWidth, selLength, selThick, selDur, selColor]);
  const tierIdx   = getTierIdx(qty);
  const unitPrice = product?.p[tierIdx] || 0;
  const total     = unitPrice * qty;
  const savings   = product ? (product.p[0] - unitPrice) * qty : 0;
  const nextT     = TIERS.slice(tierIdx+1).find(t => t.threshold > 0);

  const startEdit  = () => { setEditData(JSON.parse(JSON.stringify(products))); setEditMode(true); };
  const saveEdit   = () => { setProducts(editData); setEditMode(false); setEditData(null); };
  const cancelEdit = () => { setEditMode(false); setEditData(null); };
  const cellEdit   = (sku, field, ti, v) => setEditData(prev => prev.map(p => {
    if (p.sku !== sku) return p;
    const a = [...p[field]]; a[ti] = parseFloat(v) || 0; return {...p, [field]: a};
  }));

  const pp = v => parseFloat(String(v || "").replace(/[$,]/g, "")) || 0;

  function parseCSV(text) {
    const rows = text.split(/\r?\n/).map(r => {
      const cells = []; let inQ = false, cur = "";
      for (const ch of r) {
        if (ch === '"') inQ = !inQ;
        else if (ch === "," && !inQ) { cells.push(cur.trim()); cur = ""; }
        else cur += ch;
      }
      cells.push(cur.trim()); return cells;
    });
    const products = [];
    for (let i = 0; i < rows.length - 1; i++) {
      const r = rows[i];
      if (r.some(c => c === "SKU") && r.some(c => c.includes("MSRP"))) {
        for (let j = i + 1; j < rows.length; j++) {
          const row = rows[j];
          const sku = (row[1] || "").trim();
          if (!sku) break;
          const [wStr, lStr] = (row[2] || "").trim().split("x");
          products.push({
            sku, width: parseInt(wStr)||0, length: parseInt(lStr)||0,
            thick: (row[3]||"").replace(/\s*mil\s*/i,"").trim(),
            dur:   (row[4]||"").replace(/\s*months?\s*/i,"").trim(),
            color: sku.includes("WHT") ? "White" : "Black",
            p:  [pp(row[5]),pp(row[9]),pp(row[13]),pp(row[17])],
            ft: [pp(row[6]),pp(row[10]),pp(row[14]),pp(row[18])],
            lb: [pp(row[7]),pp(row[11]),pp(row[15]),pp(row[19])],
            kg: [pp(row[8]),pp(row[12]),pp(row[16]),pp(row[20])],
          });
        }
        break;
      }
    }
    return products.length ? products : null;
  }

  const handleSync = async () => {
    setSyncStatus("loading"); setSyncMsg("");
    try {
      let url = sheetUrl.trim();
      const idM = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (idM) url = `https://docs.google.com/spreadsheets/d/${idM[1]}/pub?output=csv`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const parsed = parseCSV(text);
      if (!parsed) throw new Error("No products found — check sheet format");
      setProducts(parsed); setSyncStatus("ok"); setSyncMsg(`Synced ${parsed.length} products`);
    } catch(e) { setSyncStatus("err"); setSyncMsg(e.message); }
  };

  const handlePaste = () => {
    const parsed = parseCSV(csvPaste);
    if (!parsed) { setSyncStatus("err"); setSyncMsg("No products found in pasted CSV"); return; }
    setProducts(parsed); setSyncStatus("ok"); setSyncMsg(`Loaded ${parsed.length} products`);
  };

  const tableRows = (editMode ? editData : products) || products;
  const tabs = adminMode
    ? [["calc","Calculator"],["prices","Price Table"]]
    : [["calc","Calculator"]];

  return (
    <div style={{fontFamily:HB, background:B, minHeight:600, paddingBottom:48, maxWidth:"100%", overflowX:"hidden"}}>

      {/* HEADER */}
      <div style={{background:GR, padding: isMobile ? "12px 16px" : "18px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:8}}>
        <div style={{minWidth:0}}>
          <div style={{fontFamily:H, fontSize: isMobile ? "20px" : "28px", color:"#2A3A10", letterSpacing:"0.02em", lineHeight:1.1}}>COST ESTIMATOR</div>
          {!isMobile && <div style={{fontSize:14, color:"#4A6018", marginTop:3, fontWeight:500}}>Microbe-edible mulch film · pricing calculator</div>}
        </div>
        {adminMode && (
          <div style={{background:"rgba(42,58,16,0.2)", borderRadius:6, padding:"4px 10px", flexShrink:0}}>
            <span style={{fontFamily:H, fontSize: isMobile ? "11px" : "14px", color:"#2A3A10", letterSpacing:"0.1em", whiteSpace:"nowrap"}}>INTERNAL VIEW</span>
          </div>
        )}
      </div>

      {/* TABS — only renders if adminMode, otherwise no tab bar needed */}
      {tabs.length > 1 && (
        <div style={{background:BDD, display:"flex", padding:"0 24px", borderBottom:`2px solid ${BDD}`}}>
          {tabs.map(([t,l]) => (

        </div>

      <div style={{maxWidth:"100%", margin:"0 auto", paddingTop:"28px", paddingBottom:"28px", paddingLeft: isMobile ? "12px" : "120px", paddingRight: isMobile ? "12px" : "120px"}}>

        {/* ═══ CALCULATOR ═══ */}
        {tab==="calc" && (
          <div style={{display:"grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap:18, alignItems:"stretch"}}>

            {/* Selectors */}
            <div style={card}>
              <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18}}>

              <div style={{display:"grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap:14}}>

                  ["Thickness",   selThick,  thicks,  t => `${t} mil`, 2],

                ].map(([lb, val, opts, render, lvl]) => (
                  <div key={lvl}>
                    <span style={lbl}>{lb}</span>
                    <select style={inpStyle} value={val} onChange={e => handleSelect(lvl, e.target.value)}>

                    style={{display:"block", textDecoration:"none", marginTop:10}}>
                    <div style={{padding:"9px 12px", background:BDD, borderRadius:6, borderLeft:`3px solid ${MID}`, display:"flex", alignItems:"center", justifyContent:"space-between", gap:8}}>
                      <div style={{fontSize:14, color:MID, lineHeight:1.5}}>Curious about the product? We offer <span style={{color:CREAM, fontFamily:H, fontSize:14}}>free sample rolls</span> for qualifying growers.</div>
                      <div style={{flexShrink:0, background:CREAM, color:BD, fontFamily:H, fontSize:14, letterSpacing:"0.06em", padding:"8px 12px", borderRadius:6, whiteSpace:"nowrap"}}>REQUEST →</div>
                    </div>
                  </a>
                )}
              </div>

              {/* All-tier reference table — now in right column */}
              {product && (
                <div style={{...card, flex:1}}>
                  <div style={{fontFamily:H, fontSize:14, color:GR, marginBottom:16, letterSpacing:"0.04em"}}>ALL PRICING TIERS</div>
                  <table style={{width:"100%", borderCollapse:"collapse", fontSize:14}}>
                    <thead>
                      <tr style={{background:GR}}>
                        {["TIER","PER ROLL","PER FT","PER LB","PER KG"].map((h, i) => (

                      </tr>
                    </thead>
                    <tbody>

                            emailjs.send("service_a7zaqnj", "template_1ae36c4", {
                              from_name:  modalName,
                              from_email: modalEmail,
                              phone:      modalPhone,
                              message:    message,
                            }).catch(err => console.warn("EmailJS:", err));

                            // Save to Supabase
                            fetch("https://sffpzzgrsrzturrhvfwl.supabase.co/rest/v1/grower_submissions", {
                              method: "POST",
                              headers: {
                                "Content-Type": "application/json",
                                "apikey": "sb_publishable_sNQpKd8CkNXeVJMSwPPLOA_3WWYiWen",
                                "Authorization": "Bearer sb_publishable_sNQpKd8CkNXeVJMSwPPLOA_3WWYiWen",
                                "Prefer": "return=minimal"
                              },
                              body: JSON.stringify({
                                name:               modalName,
                                email:              modalEmail,
                                phone:              modalPhone,
                                sku:                product?.sku || null,
                                quantity:           qty,
                                unit_price:         unitPrice,
                                conv_mulch_cost:    parseFloat(convMulchCost) || 0,
                                rolls_per_acre:     parseFloat(convLaborHrs)  || 0,
                                removal_labor:      parseFloat(convLaborRate) || 0,
                                disposal:           parseFloat(convDisposal)  || 0,
                                conv_total_per_acre: convTotal,
                                bumi_total_per_acre: bumiTotal,
                                savings_per_acre:   savings,
                              })
                            }).catch(err => console.warn("Supabase:", err));
                          }}
                          style={{...gBtn, flex:2}}
                        >
                          SEE MY RESULTS
                        </button>
                      </div>
                    </div>
                  </div>,
                  document.body
                )}

                {/* Comparison output */}
                {compCalculated && (() => {
                  const mulch           = parseFloat(convMulchCost)  || 0;
                  const rollsPerAcre    = parseFloat(convLaborHrs)   || 0;
                  const removalPerAcre  = parseFloat(convLaborRate)  || 0;
                  const disposalPerAcre = parseFloat(convDisposal)   || 0;
                  const mulchPerAcre    = mulch * rollsPerAcre;
                  const convPerAcre     = mulchPerAcre + removalPerAcre + disposalPerAcre;
                  const bumiPerAcre     = unitPrice * rollsPerAcre;
                  const diff            = convPerAcre - bumiPerAcre;
                  const hasData         = convPerAcre > 0;

                  return (
                    <div className="anim-fade-up">
                      {/* Side by side */}
                      <div style={{display:"grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap:12, marginBottom:16}}>
                        {/* Conventional */}
                        <div style={{background:BDD, borderRadius:8, overflow:"hidden"}}>
                          <div style={{background:CREAM, padding:"10px 14px", fontFamily:H, fontSize:14, color:BD, letterSpacing:"0.08em"}}>CONVENTIONAL PLASTIC</div>
                          <div style={{padding:"14px"}}>
                            <div style={{display:"flex", justifyContent:"space-between", marginBottom:8, fontSize:14}}>
                              <span style={{color:DIM}}>Mulch cost per acre</span>
                              <span style={{color:CREAM, fontFamily:H, fontSize:14}}>{mulchPerAcre > 0 ? fmt(mulchPerAcre) : "—"}</span>
                            </div>
                            <div style={{display:"flex", justifyContent:"space-between", marginBottom:8, fontSize:14}}>
                              <span style={{color:DIM}}>Plastic removal labor per acre</span>
                              <span style={{color:CREAM, fontFamily:H, fontSize:14}}>{removalPerAcre > 0 ? fmt(removalPerAcre) : "—"}</span>
                            </div>
                            <div style={{display:"flex", justifyContent:"space-between", marginBottom:12, fontSize:14}}>
                              <span style={{color:DIM}}>Plastic disposal / hauling per acre</span>
                              <span style={{color:CREAM, fontFamily:H, fontSize:14}}>{disposalPerAcre > 0 ? fmt(disposalPerAcre) : "—"}</span>
                            </div>
                            <div style={{borderTop:`1px solid ${BDD}`, paddingTop:10}}>
                              <div style={{display:"flex", justifyContent:"space-between"}}>
                                <span style={{color:MID, fontFamily:H, fontSize:14, letterSpacing:"0.04em"}}>TOTAL COST PER ACRE</span>
                                <span style={{color:CREAM, fontFamily:H, fontSize:14}}>{hasData ? fmt(convPerAcre) : "—"}</span>
                              </div>
                            </div>
                          </div>
                        </div>

                        {/* Bumigro */}
                        <div style={{background:BDD, borderRadius:8, overflow:"hidden"}}>
                          <div style={{background:GR, padding:"10px 14px", fontFamily:H, fontSize:14, color:"#2A3A10", letterSpacing:"0.08em"}}>BŪMIGRO MICROBE-EDIBLE</div>
                          <div style={{padding:"14px"}}>
                            <div style={{display:"flex", justifyContent:"space-between", marginBottom:8, fontSize:14}}>
                              <span style={{color:DIM}}>Mulch cost per acre</span>
                              <span style={{color:CREAM, fontFamily:H, fontSize:14}}>{rollsPerAcre > 0 ? fmt(bumiPerAcre) : "—"}</span>
                            </div>
                            <div style={{display:"flex", justifyContent:"space-between", marginBottom:8, fontSize:14}}>
                              <span style={{color:DIM}}>Removal labor per acre</span>
                              <span style={{color:GR, fontFamily:H, fontSize:14}}>$0.00</span>
                            </div>
                            <div style={{display:"flex", justifyContent:"space-between", marginBottom:12, fontSize:14}}>
                              <span style={{color:DIM}}>Disposal / hauling per acre</span>
                              <span style={{color:GR, fontFamily:H, fontSize:14}}>$0.00</span>
                            </div>
                            <div style={{borderTop:`1px solid ${BDD}`, paddingTop:10}}>
                              <div style={{display:"flex", justifyContent:"space-between"}}>
                                <span style={{color:MID, fontFamily:H, fontSize:14, letterSpacing:"0.04em"}}>TOTAL COST PER ACRE</span>
                                <span style={{color:GR, fontFamily:H, fontSize:14}}>{rollsPerAcre > 0 ? fmt(bumiPerAcre) : "—"}</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* Delta callout */}
                      {hasData && (
                        <div style={{
                          padding:"28px 24px", borderRadius:8, textAlign:"center",
                          background: diff > 0 ? "#2A3A10" : BDD,
                          border: diff > 0 ? `2px solid ${GR}` : `1px solid ${BDD}`,
                        }}>
                          {diff > 0 ? (
                            <>
                              <div style={{fontFamily:H, fontSize:14, color:GR, letterSpacing:"0.12em", marginBottom:12}}>ESTIMATED SAVINGS PER ACRE WITH BŪMIGRO</div>
                              <div style={{fontFamily:H, fontSize:60, color:GR, lineHeight:1}}>{fmt(diff)}</div>
                              <div style={{width:48, height:2, background:GR, margin:"16px auto 0", borderRadius:2}}></div>
                            </>
                          ) : (
                            <>
                              <div style={{fontFamily:H, fontSize:14, color:MID, letterSpacing:"0.08em", marginBottom:8}}>ENTER YOUR CURRENT COSTS ABOVE TO SEE YOUR SAVINGS PER ACRE</div>
                              <div style={{fontSize:14, color:DIM}}>būmigro eliminates removal labor and disposal fees entirely.</div>
                            </>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            )}
          </div>
        )}

        {/* ═══ PRICE TABLE (admin only) ═══ */}
        {tab==="prices" && adminMode && (
          <div>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16}}>
              <div style={{fontFamily:H, fontSize:14, color: editMode ? GR : DIM, letterSpacing:"0.08em"}}>
                {editMode ? "EDIT MODE — CLICK SAVE WHEN DONE" : `${products.length} PRODUCTS`}
              </div>
              <div style={{display:"flex", gap:8}}>
                {editMode ? (
                  <>
                    <button onClick={cancelEdit} style={oBtn}>CANCEL</button>
                    <button onClick={saveEdit} style={gBtn}>SAVE CHANGES</button>
                  </>
                ) : (
                  <button onClick={startEdit} style={oBtn}>EDIT PRICES</button>
                )}
              </div>
            </div>
            <div style={{...card, padding:0, overflow:"auto"}}>
              <table style={{width:"100%", borderCollapse:"collapse", fontSize:14}}>
                <thead>
                  <tr style={{background:GR, position:"sticky", top:0}}>
                    {["SKU","Size","Mil","Mo", ...TIERS.map(t => t.short)].map((h, i) => (
                      <th key={i} style={{padding:"10px 10px", fontFamily:H, fontSize:14, color:"#2A3A10", letterSpacing:"0.06em", whiteSpace:"nowrap", textAlign: i<4 ? "left" : "right", borderLeft: i>=4 ? `1px solid rgba(42,58,16,0.2)` : "none"}}>{h.toUpperCase()}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {tableRows.map((p, ri) => (
                    <tr key={p.sku} style={{borderTop:`1px solid ${BDD}`, background: ri%2===0 ? BD : BDD}}>
                      <td style={{padding:"8px 10px", fontFamily:"monospace", fontSize:14, color:DIM, whiteSpace:"nowrap"}}>{p.sku}</td>
                      <td style={{padding:"8px", color:MID, whiteSpace:"nowrap"}}>{p.width}"×{p.length.toLocaleString()}'</td>
                      <td style={{padding:"8px", color:MID}}>{p.thick}</td>
                      <td style={{padding:"8px", color:MID}}>{p.dur}</td>
                      {p.p.map((price, ti) => (
                        <td key={ti} style={{textAlign:"right", padding:"6px 8px", borderLeft:`1px solid ${BDD}`}}>
                          {editMode
                            ? <input type="number" step="0.01"
                                value={editData.find(x => x.sku===p.sku)?.p[ti] ?? price}
                                onChange={e => cellEdit(p.sku, "p", ti, e.target.value)}
                                style={{...inpStyle, width:72, fontSize:14, padding:"4px 6px", textAlign:"right"}} />
                            : <span style={{fontFamily:H, fontSize:14, color: ti===0 ? CREAM : GR}}>{fmt(price)}</span>
                          }
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:14, color:DIM, marginTop:8, fontFamily:H, letterSpacing:"0.04em"}}>SHOWING MSRP · 10% · 20% · 30% DISCOUNT TIERS PER ROLL</div>
          </div>
        )}
      </div>

    </div>
  );
}

    document.getElementById('loading').style.display = 'none';
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BumigroCalculator adminMode={true} />);
  </script>
</body>
</html>
